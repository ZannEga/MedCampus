<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User - MedCampus Admin</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg> MedCampus
        </div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html"><svg><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg> Dashboard</a>
            <a href="admin-inventory.html"><svg><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg> Inventory</a>
            <a href="admin-users.html" class="active"><svg><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg> Users</a>
            <a href="admin-schedules.html"><svg><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> Schedules</a>
        </nav>
        <div class="sidebar-footer">
            <a href="admin-settings.html" style="display: flex; align-items: center; gap: 12px; padding: 0 20px; color: var(--text-gray); font-size: 13px; font-weight: 500;"><svg width="18" style="stroke: currentColor; fill: none; stroke-width: 2;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg> Settings</a>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="breadcrumb">Admin &rsaquo; Users &rsaquo; <span>New User</span></div>
            <div class="topbar-right">
                <div class="admin-profile">
                    <div class="admin-info"><h4>Admin User</h4><p>Super Admin</p></div>
                    <div class="admin-avatar"><img src="https://placehold.co/40x40/94a3b8/fff?text=AU" style="width:100%;"></div>
                </div>
            </div>
        </header>

        <main class="content-area" style="max-width: 900px;">
            <div class="page-header" style="margin-bottom: 40px;">
                <div>
                    <h1>Create New User</h1>
                    <p>Register a new member to the MedCampus ecosystem.<br>Ensure all clinical credentials and departmental assignments are accurate.</p>
                </div>
            </div>

            <form action="admin-users.html" class="admin-form-container">
                <div class="admin-form-group">
                    <label class="admin-form-label">Full Name</label>
                    <input type="text" class="admin-form-input" placeholder="e.g. Dr. Julian Harrison" style="background: var(--white);">
                </div>

                <div class="grid-2-chart" style="grid-template-columns: 1fr 1fr;">
                    <div class="admin-form-group">
                        <label class="admin-form-label">Email Address</label>
                        <input type="email" class="admin-form-input" placeholder="j.harrison@medcampus.edu" style="background: var(--white);">
                    </div>
                    <div class="admin-form-group">
                        <label class="admin-form-label">Phone Number</label>
                        <input type="text" class="admin-form-input" placeholder="+1 (555) 000-0000" style="background: var(--white);">
                    </div>
                </div>

                <h3 style="font-size: 16px; margin: 32px 0 16px;">Organizational Details</h3>

                <div class="grid-2-chart" style="grid-template-columns: 1fr 1fr;">
                    <div class="admin-form-group">
                        <label class="admin-form-label">Role Selection</label>
                        <select class="admin-form-select">
                            <option value="student">Student</option>
                            <option value="doctor">Doctor</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="admin-form-group">
                        <label class="admin-form-label">Department / Poli</label>
                        <select class="admin-form-select">
                            <option value="general">General Medicine</option>
                            <option value="dental">Dental Clinic</option>
                            <option value="pharmacy">Pharmacy</option>
                            <option value="none">None (Student/Admin)</option>
                        </select>
                    </div>
                </div>

                <div style="border-top: 1px solid var(--border); margin-top: 32px; padding-top: 24px; display: flex; justify-content: flex-end; gap: 16px;">
                    <a href="admin-users.html" class="btn btn-outline" style="border: none;">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create User</button>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
